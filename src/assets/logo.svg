<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <!-- Outer circle with gradient -->
  <defs>
    <linearGradient id="circleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#001a33;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#003d66;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Outer circle ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#7a8a9a" stroke-width="3"/>
  <circle cx="100" cy="100" r="88" fill="none" stroke="#7a8a9a" stroke-width="1"/>
  
  <!-- Main circle background -->
  <circle cx="100" cy="100" r="85" fill="url(#circleGradient)"/>
  
  <!-- Woman's profile silhouette with flowing hair -->
  <g transform="translate(100, 100)">
    <!-- Face/head profile -->
    <ellipse cx="-15" cy="-10" rx="18" ry="22" fill="white"/>
    
    <!-- Hair flowing -->
    <path d="M 0,-28 Q 25,-20 28,-5 Q 30,5 25,15 Q 20,22 12,25" 
          fill="white" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
    
    <!-- Additional hair strands for flow -->
    <path d="M 5,-32 Q 28,-25 32,0 Q 33,10 28,20" 
          fill="none" stroke="white" stroke-width="3" stroke-linecap="round"/>
    
    <path d="M 10,-33 Q 32,-28 35,-5 Q 35,8 30,22" 
          fill="none" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
